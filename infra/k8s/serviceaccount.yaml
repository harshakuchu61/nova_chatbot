# Kubernetes ServiceAccount bound to the GCP service account via
# Workload Identity — gives pods Secret Manager + Cloud SQL access
# without any key files.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nova-ksa
  namespace: nova
  annotations:
    # Replace with your GCP project ID if different
    iam.gke.io/gcp-service-account: nova-sa@nova-chatbot-493921.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/name: nova
