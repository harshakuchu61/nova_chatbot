# GKE Ingress — provisions a Google Cloud HTTPS Load Balancer.
# Requires the static IP and managed cert created by setup-gke.ps1.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nova-ingress
  namespace: nova
  labels:
    app.kubernetes.io/name: nova
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: nova-ip
    networking.gke.io/managed-certificates: nova-cert
    # Keep HTTP on while certificate is provisioning.
    # After cert is Active, set this to "false".
    kubernetes.io/ingress.allow-http: "true"
spec:
  ingressClassName: gce
  rules:
  - host: novagptapp.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nova-service
            port:
              number: 80
  - host: www.novagptapp.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nova-service
            port:
              number: 80
