# Google-managed TLS certificate — GKE provisions and auto-renews it.
# Update `domains` with your actual domain name after pointing DNS
# to the static IP created by setup-gke.ps1.
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: nova-cert
  namespace: nova
spec:
  domains:
  - novagptapp.com
  - www.novagptapp.com
