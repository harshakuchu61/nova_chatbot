apiVersion: apps/v1
kind: Deployment
metadata:
  name: nova-app
  namespace: nova
  labels:
    app.kubernetes.io/name: nova
    app.kubernetes.io/version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nova-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime deploys
  template:
    metadata:
      labels:
        app: nova-app
        app.kubernetes.io/name: nova
    spec:
      serviceAccountName: nova-ksa
      terminationGracePeriodSeconds: 60
      volumes:
      - name: cloudsql
        emptyDir: {}

      containers:
      - name: nova-app
        # Updated by CI/CD — do not edit manually
        image: us-central1-docker.pkg.dev/nova-chatbot-493921/nova-repo/nova-app:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        env:
        - name: PORT
          value: "8080"
        - name: GOOGLE_CLOUD_PROJECT
          value: "nova-chatbot-493921"
        - name: VERTEX_LOCATION
          value: "us-central1"
        - name: VERTEX_DEFAULT_MODEL
          value: "gemini-2.0-flash"
        # Tells the app it is running in GKE (not Cloud Run)
        - name: DEPLOYMENT_ENV
          value: "gke"

        resources:
          requests:
            cpu: "300m"
            memory: "384Mi"
          limits:
            cpu: "2000m"
            memory: "1Gi"

        startupProbe:
          httpGet:
            path: /health
            port: 8080
          # Give the app more time during cold boot / DB reconnects.
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 18

        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 5

        lifecycle:
          preStop:
            exec:
              # Allows in-flight requests to finish before pod is removed
              command: ["/bin/sh", "-c", "sleep 5"]
        volumeMounts:
        - name: cloudsql
          mountPath: /cloudsql

      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.4
        args:
        - --structured-logs
        - --unix-socket=/cloudsql
        - nova-chatbot-493921:us-central1:nova-db
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
        securityContext:
          runAsNonRoot: true
        volumeMounts:
        - name: cloudsql
          mountPath: /cloudsql

      # Keep placement flexible under quota pressure to avoid pending pods.
      topologySpreadConstraints:
      - maxSkew: 2
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: nova-app
