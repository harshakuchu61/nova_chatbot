# =============================================================
#  CI/CD Pipeline — Nova Chatbot
#
#  ┌─ on every PR  ──► ci  (lint + security audit)
#  └─ on push/main ──► ci → deploy (build, push, Cloud Run)
#
#  Auth: Workload Identity Federation (keyless — no SA keys)
#  Run setup-gha.ps1 once to provision the GCP side, then
#  add the three secrets shown at the bottom of that script.
# =============================================================

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION:  us-central1
  SERVICE: nova-chatbot
  REPO:    nova-repo             # Artifact Registry repository
  IMAGE:   nova-app

# ─────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & Security (every push + PR) ──────────────────
  ci:
    name: Lint & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install lint tools
        run: pip install flake8 pip-audit

      - name: Lint — flake8
        run: |
          flake8 server/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --exclude=server/__pycache__,server/migrations

      - name: Security audit — pip-audit
        run: pip-audit -r server/requirements.txt
        # Warn on known CVEs but don't block the pipeline
        continue-on-error: true

  # ── 2. Build → Push → Deploy (main branch only) ───────────
  deploy:
    name: Build & Deploy to Cloud Run
    needs: ci
    runs-on: ubuntu-latest
    # Only deploy when a commit lands on main (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # GitHub Environment gate — add required reviewers in repo
    # Settings → Environments → production for approval flow
    environment: production

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Keyless GCP auth (no stored SA key) ───────────────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # ── Docker setup with registry-level layer cache ───────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # ── Build & push (uses Artifact Registry as cache) ────
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:buildcache,mode=max

      # ── Deploy the new image to Cloud Run ─────────────────
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region:  ${{ env.REGION }}
          image:   ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Print service URL
        run: echo "Deployed → ${{ steps.deploy.outputs.url }}"
