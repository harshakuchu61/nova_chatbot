# =============================================================
#  CI/CD Pipeline — Nova Chatbot
#
#  ┌─ on every PR  ──► ci  (lint + security audit)
#  └─ on push/main ──► ci → deploy (build, push, GKE rolling update)
#
#  Auth: Workload Identity Federation (keyless — no SA keys)
#  Run scripts/setup-gha.ps1 once to provision the GCP side, then
#  add the three secrets shown at the bottom of that script.
#  Run scripts/setup-gke.ps1 once to create the GKE cluster.
# =============================================================

name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION:      us-central1
  REPO:        nova-repo
  IMAGE:       nova-app
  GKE_CLUSTER: nova-cluster
  GKE_NS:      nova

# ─────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & Security (every push + PR) ──────────────────
  ci:
    name: Lint & Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install lint tools
        run: pip install flake8 pip-audit

      - name: Lint — flake8
        run: |
          flake8 backend/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --exclude=backend/__pycache__,backend/migrations

      - name: Security audit — pip-audit
        run: pip-audit -r backend/requirements.txt
        continue-on-error: true

  # ── 2. Build → Push → Deploy to GKE (main branch only) ────
  deploy:
    name: Build & Deploy to GKE
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # GitHub Environment gate — add required reviewers in repo
    # Settings → Environments → production for approval flow
    environment: production

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Keyless auth via Workload Identity Federation ──────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # ── Docker setup with registry-level layer cache ───────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # ── Build & push (uses Artifact Registry as cache) ────
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:buildcache,mode=max

      # ── Configure kubectl ──────────────────────────────────
      - name: Set up kubectl
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location:     ${{ env.REGION }}
          project_id:   ${{ secrets.GCP_PROJECT_ID }}

      # ── Rolling update — zero downtime ────────────────────
      - name: Update deployment image
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          kubectl set image deployment/nova-app \
            nova-app=$IMAGE_TAG \
            -n ${{ env.GKE_NS }}

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/nova-app \
            -n ${{ env.GKE_NS }} \
            --timeout=300s

      - name: Print cluster info
        run: |
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.GKE_NS }}
          echo "=== Ingress ==="
          kubectl get ingress -n ${{ env.GKE_NS }}
