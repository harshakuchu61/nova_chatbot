<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="login-page">
    <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
            <span class="login-logo-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#CC0000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                </svg>
            </span>
            <span class="login-logo-text">Nova</span>
        </div>

        <h1 class="login-title" id="login-title">Welcome back</h1>
        <p class="login-subtitle" id="login-subtitle">Sign in to your account to continue</p>

        <!-- Error banner -->
        <div id="error-banner" class="error-banner" hidden></div>

        <!-- OAuth buttons -->
        <div id="oauth-section" class="oauth-section" hidden>
            <a id="google-btn" href="/google/login" class="oauth-btn oauth-google" hidden>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </a>
            <a id="github-btn" href="/github/login" class="oauth-btn oauth-github" hidden>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
                </svg>
                Continue with GitHub
            </a>
        </div>

        <!-- Divider -->
        <div id="divider" class="login-divider" hidden>
            <span>or</span>
        </div>

        <!-- Email/password form -->
        <form id="auth-form" class="auth-form" novalidate>
            <!-- Name field (register only) -->
            <div class="form-field" id="name-field" hidden>
                <label for="name-input">Display name</label>
                <input type="text" id="name-input" placeholder="Your name" autocomplete="name">
            </div>
            <div class="form-field">
                <label for="email-input">Email</label>
                <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="form-field">
                <label for="password-input">Password</label>
                <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password" required minlength="8">
            </div>
            <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
        </form>

        <!-- Toggle login / register -->
        <p class="login-toggle">
            <span id="toggle-text">Don't have an account?</span>
            <button type="button" id="toggle-btn" class="btn-link">Create one</button>
        </p>
    </div>
</div>

<script>
(function () {
    'use strict';

    var title        = document.getElementById('login-title');
    var subtitle     = document.getElementById('login-subtitle');
    var errorBanner  = document.getElementById('error-banner');
    var oauthSection = document.getElementById('oauth-section');
    var divider      = document.getElementById('divider');
    var googleBtn    = document.getElementById('google-btn');
    var githubBtn    = document.getElementById('github-btn');
    var authForm     = document.getElementById('auth-form');
    var nameField    = document.getElementById('name-field');
    var nameInput    = document.getElementById('name-input');
    var emailInput   = document.getElementById('email-input');
    var passwordInput= document.getElementById('password-input');
    var submitBtn    = document.getElementById('submit-btn');
    var toggleText   = document.getElementById('toggle-text');
    var toggleBtn    = document.getElementById('toggle-btn');

    var isRegister   = false;

    // If already authenticated, go to the main app (fixes back-button loop)
    fetch('/auth/me').then(function(r) {
        if (r.ok) window.location.replace('/');
    }).catch(function() { /* not logged in — stay */ });

    // Check for error in query string (e.g. OAuth failure)
    var params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
        showError('OAuth sign-in failed. Please try again or use email/password.');
    }

    // Load config: which OAuth providers are available
    fetch('/api/config')
        .then(function (r) { return r.json(); })
        .then(function (cfg) {
            var hasOAuth = false;
            if (cfg.google_oauth) { googleBtn.hidden = false; hasOAuth = true; }
            if (cfg.github_oauth) { githubBtn.hidden = false; hasOAuth = true; }
            if (hasOAuth) {
                oauthSection.hidden = false;
                divider.hidden = false;
            }
        })
        .catch(function () { /* offline — show form only */ });

    // Toggle between login and register
    toggleBtn.addEventListener('click', function () {
        isRegister = !isRegister;
        if (isRegister) {
            title.textContent    = 'Create account';
            subtitle.textContent = 'Start chatting with Nova for free';
            submitBtn.textContent= 'Create Account';
            toggleText.textContent = 'Already have an account?';
            toggleBtn.textContent  = 'Sign in';
            nameField.hidden = false;
            passwordInput.setAttribute('autocomplete', 'new-password');
            passwordInput.setAttribute('placeholder', 'Min. 8 characters');
        } else {
            title.textContent    = 'Welcome back';
            subtitle.textContent = 'Sign in to your account to continue';
            submitBtn.textContent= 'Sign In';
            toggleText.textContent = "Don't have an account?";
            toggleBtn.textContent  = 'Create one';
            nameField.hidden = true;
            passwordInput.setAttribute('autocomplete', 'current-password');
            passwordInput.setAttribute('placeholder', '••••••••');
        }
        hideError();
    });

    // Form submit
    authForm.addEventListener('submit', async function (e) {
        e.preventDefault();
        hideError();

        var email    = emailInput.value.trim();
        var password = passwordInput.value;
        var name     = nameInput.value.trim();

        if (!email || !password) { showError('Email and password are required.'); return; }

        submitBtn.disabled   = true;
        submitBtn.textContent = isRegister ? 'Creating account…' : 'Signing in…';

        try {
            var endpoint = isRegister ? '/auth/register' : '/auth/login';
            var body     = isRegister
                ? { email: email, password: password, name: name }
                : { email: email, password: password };

            var res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            var data = await res.json();
            if (res.ok && data.ok) {
                window.location.href = '/';
            } else {
                showError(data.error || 'Something went wrong. Please try again.');
            }
        } catch (err) {
            showError('Network error. Please check your connection and try again.');
        } finally {
            submitBtn.disabled   = false;
            submitBtn.textContent = isRegister ? 'Create Account' : 'Sign In';
        }
    });

    function showError(msg) {
        errorBanner.textContent = msg;
        errorBanner.hidden      = false;
    }

    function hideError() {
        errorBanner.hidden = true;
        errorBanner.textContent = '';
    }
}());
</script>
</body>
</html>
